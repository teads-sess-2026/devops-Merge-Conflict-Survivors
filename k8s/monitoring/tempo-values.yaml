tempo:
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 200m
      memory: 512Mi

tempoQuery:
  enabled: false

service:
  type: ClusterIP

persistence:
  enabled: false

config: |
  multitenancy_enabled: false
  usage_report:
    reporting_enabled: false
  compactor:
    compaction:
      block_retention: 48h
  distributor:
    receivers:
      otlp:
        protocols:
          http:
            endpoint: 0.0.0.0:4318
          grpc:
            endpoint: 0.0.0.0:4317
  ingester:
    trace_idle_period: 10s
    max_block_duration: 5m
  querier: {}
  query_frontend: {}
  storage:
    trace:
      backend: local
      local:
        path: /var/tempo/traces
      wal:
        path: /var/tempo/wal
  server:
    http_listen_port: 3100
