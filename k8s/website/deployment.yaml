apiVersion: apps/v1
kind: Deployment
metadata:
  name: website
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: website
  template:
    metadata:
      labels:
        app: website
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: /metrics
    spec:
      containers:
        - name: app
          image: 937697200280.dkr.ecr.eu-west-1.amazonaws.com/merge-conflict-survivors:latest # {"$imagepolicy": "flux-system:merge-conflict-survivors"}
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: OTEL_SERVICE_NAME
              value: k8s-website
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://tempo.monitoring.svc.cluster.local:4318
          resources:
            requests:
              cpu: 150m
              memory: 150Mi # was 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 1
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 1
            failureThreshold: 3
