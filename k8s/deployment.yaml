apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-workload
  namespace: default
  labels:
    app: test-workload
spec:
  replicas: 2
  selector:
    matchLabels:
      app: test-workload
  template:
    metadata:
      labels:
        app: test-workload
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: app
        image: 937697200280.dkr.ecr.eu-west-1.amazonaws.com/merge-conflict-survivors:36609231f43b5d93a8964754145ce9250ab27bae
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: OTEL_SERVICE_NAME
          value: k8s-test-workload
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: http://tempo.monitoring.svc.cluster.local:4318
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "200m"
