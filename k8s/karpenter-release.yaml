apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: karpenter
  namespace: karpenter
spec:
  interval: 1m
  chart:
    spec:
      chart: oci://public.ecr.aws/karpenter/karpenter
      version: "v0.32.0"
      sourceRef:
        kind: HelmRepository
        name: karpenter
        namespace: karpenter
  install:
    crds: Create
  upgrade:
    crds: CreateReplace
  values:
    serviceAccount:
      annotations:
        eks.amazonaws.com/role-arn: arn:aws:iam::937697200280:role/KarpenterControllerRole
    settings:
      clusterName: eks-merge-conflict-survivors
      interruptionQueue: karpenter-interruption-queue
