apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImageRepository
metadata:
  name: test-workload
  namespace: flux-system
spec:
  image: 937697200280.dkr.ecr.eu-west-1.amazonaws.com/merge-conflict-survivors
  interval: 1m

---
apiVersion: image.toolkit.fluxcd.io/v1beta1
kind: ImagePolicy
metadata:
  name: test-workload
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: test-workload
  policy:
    semver:
      range: '>=0.0.0'

---
apiVersion: image.toolkit.fluxcd.io/v1beta1
kind: ImageUpdateAutomation
metadata:
  name: flux-system
  namespace: flux-system
spec:
  interval: 1m
  sourceRef:
    kind: GitRepository
    name: flux-system
  git:
    commit:
      author:
        email: flux@example.com
        name: Flux
      messageTemplate: 'chore: Update image to {{range .Updated.Images}}{{println .}}{{end}}'
  update:
    path: ./k8s
    strategy: Setters
