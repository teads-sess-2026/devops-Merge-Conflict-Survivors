name: Deploy

on:
  push:
    branches: [main]
    paths-ignore: [terraform/**]

permissions:
  id-token: write
  contents: read

env:
  ECR_REPOSITORY: merge-conflict-survivors
  EKS_CLUSTER: eks-merge-conflict-survivors
  AWS_REGION: eu-west-1

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -f app/Dockerfile app/
          docker push $REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT
        id: build

      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/

      - name: Create kubeconfig with token
        run: python3 scripts/create-kubeconfig.py

      - name: Apply aws-auth ConfigMap
        env:
          GITHUB_ACTIONS_ROLE_ARN: arn:aws:iam::937697200280:role/github-actions-role
        run: |
          sed -i "s|GITHUB_ACTIONS_ROLE_ARN_PLACEHOLDER|$GITHUB_ACTIONS_ROLE_ARN|g" k8s/aws-auth.yaml
          kubectl apply -f k8s/aws-auth.yaml --validate=false

      - name: Deploy to EKS
        env:
          IMAGE: ${{ steps.build.outputs.image }}
        run: |
          sed -i "s|IMAGE_PLACEHOLDER|$IMAGE|g" k8s/deployment.yaml k8s/service.yaml
          echo "=== Deployment manifest ==="
          cat k8s/deployment.yaml
          echo "=== Applying ==="
          kubectl apply -f k8s/deployment.yaml k8s/service.yaml --validate=false
