name: Deploy

on:
  push:
    branches: [main]
    paths-ignore: [terraform/**]

permissions:
  id-token: write
  contents: write

env:
  ECR_REPOSITORY: merge-conflict-survivors
  AWS_REGION: eu-west-1

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -f app/Dockerfile app/
          docker push $REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT
        id: build

      - name: Update deployment manifest
        env:
          IMAGE: ${{ steps.build.outputs.image }}
        run: |
          sed -i "s|IMAGE_PLACEHOLDER|$IMAGE|g" k8s/deployment.yaml

      - name: Commit and push manifests
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add k8s/deployment.yaml
          git commit -m "Update image to ${{ github.sha }}" || true
          git push

      - name: Install kubectl and helm
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl && sudo mv kubectl /usr/local/bin/
          curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      - name: Create kubeconfig with token
        run: python3 scripts/create-kubeconfig.py

      - name: Deploy monitoring stack
        run: |
          kubectl apply -f k8s/monitoring/namespace.yaml

          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo add grafana https://grafana.github.io/helm-charts
          helm repo update

          helm upgrade --install kube-prometheus-stack prometheus-community/kube-prometheus-stack \
            --namespace monitoring \
            --values k8s/monitoring/prometheus-values.yaml \
            --wait --timeout 5m

          helm upgrade --install loki grafana/loki \
            --namespace monitoring \
            --values k8s/monitoring/loki-values.yaml \
            --wait --timeout 3m

          helm upgrade --install tempo grafana/tempo \
            --namespace monitoring \
            --values k8s/monitoring/tempo-values.yaml \
            --wait --timeout 3m

          helm upgrade --install promtail grafana/promtail \
            --namespace monitoring \
            --values k8s/monitoring/promtail-values.yaml \
            --wait --timeout 3m

      - name: Deploy application
        run: |
          kubectl apply -f k8s/deployment.yaml k8s/service.yaml --validate=false
