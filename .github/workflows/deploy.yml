name: Deploy

on:
  push:
    branches: [main]
    paths-ignore: [terraform/**]

permissions:
  id-token: write
  contents: read

env:
  ECR_REPOSITORY: merge-conflict-survivors
  EKS_CLUSTER: eks-merge-conflict-survivors
  AWS_REGION: eu-west-1

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -f app/Dockerfile app/
          docker push $REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT
        id: build

      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/

      - name: Verify AWS credentials
        run: |
          aws sts get-caller-identity
          aws eks describe-cluster --name $EKS_CLUSTER --region $AWS_REGION

      - name: Configure kubeconfig with token
        run: |
          ENDPOINT=$(aws eks describe-cluster --name $EKS_CLUSTER --region $AWS_REGION --query 'cluster.endpoint' --output text)
          CA=$(aws eks describe-cluster --name $EKS_CLUSTER --region $AWS_REGION --query 'cluster.certificateAuthority.data' --output text)
          TOKEN=$(aws eks get-token --cluster-name $EKS_CLUSTER --region $AWS_REGION --query 'status.token' --output text)

          mkdir -p ~/.kube
          cat > ~/.kube/config <<'EOF'
apiVersion: v1
kind: Config
clusters:
- name: eks-cluster
  cluster:
    server: ENDPOINT_PLACEHOLDER
    certificate-authority-data: CA_PLACEHOLDER
contexts:
- name: eks-cluster
  context:
    cluster: eks-cluster
    user: eks-cluster
current-context: eks-cluster
users:
- name: eks-cluster
  user:
    token: TOKEN_PLACEHOLDER
EOF

          sed -i "s|ENDPOINT_PLACEHOLDER|$ENDPOINT|g" ~/.kube/config
          sed -i "s|CA_PLACEHOLDER|$CA|g" ~/.kube/config
          sed -i "s|TOKEN_PLACEHOLDER|$TOKEN|g" ~/.kube/config

          echo "Kubeconfig created:"
          cat ~/.kube/config

      - name: Deploy to EKS
        env:
          IMAGE: ${{ steps.build.outputs.image }}
          KUBECONFIG: ~/.kube/config
        run: |
          kubectl config current-context
          sed -i "s|IMAGE_PLACEHOLDER|$IMAGE|g" k8s/*.yaml
          kubectl apply -f k8s/ --validate=false
